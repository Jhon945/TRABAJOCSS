<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Administrativo</title>

<link rel="stylesheet" href="styles.css">
</head>

<body class="dashboard">

<!--
    Barra lateral de navegación.
    Contiene las opciones principales del sistema.
-->
<nav class="sidebar" role="navigation">

    <h2>Inventario</h2>

    <ul>
        <li onclick="cerrarMenu()">Inicio</li>
        <li onclick="cerrarMenu()">Productos</li>
        <li onclick="cerrarMenu()">Ventas</li>
        <li onclick="cerrarMenu()">Usuarios</li>
    </ul>

</nav>

<!-- Fondo oscuro cuando el menú está abierto en móvil -->
<div class="overlay" onclick="cerrarMenu()"></div>

<!--
    Encabezado superior del dashboard.
    Incluye botón menú para dispositivos móviles.
-->
<header class="header">

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<h1>Panel Administrativo</h1>

</header>

<!--
    Área principal donde se muestra la información.
-->
<main class="main" role="main">

<!-- Tarjetas resumen -->
<section class="cards">

<article class="card">
<h3>Productos</h3>
<p>120</p>
</article>

<article class="card">
<h3>Ventas Hoy</h3>
<p>35</p>
</article>

<article class="card">
<h3>Stock Bajo</h3>
<p>8</p>
</article>

</section>

<!-- Tabla de datos -->
<section class="table-section">

<h2>Productos recientes</h2>

<table>
<thead>
<tr>
<th>Producto</th>
<th>Stock</th>
<th>Precio</th>
</tr>
</thead>

<tbody>
<tr>
<td>Laptop</td>
<td>15</td>
<td>$2.000</td>
</tr>

<tr>
<td>Mouse</td>
<td>50</td>
<td>$40</td>
</tr>

<tr>
<td>Teclado</td>
<td>25</td>
<td>$80</td>
</tr>
</tbody>
</table>

</section>

</main>

<!-- Footer informativo -->
<footer class="footer" role="contentinfo">
© 2026 Dashboard CSS3 - Actividad Académica
</footer>

<script>
/*Agregamos scrip para poder hacer funcional el menu en la version móvil*/

/* Abre o cierra el menú móvil */
function toggleMenu(){
    document.querySelector(".sidebar").classList.toggle("active");
    document.querySelector(".overlay").classList.toggle("active");
}

/* Cierra el menú */
function cerrarMenu(){
    document.querySelector(".sidebar").classList.remove("active");
    document.querySelector(".overlay").classList.remove("active");
}

</script>

</body>
</html>s
